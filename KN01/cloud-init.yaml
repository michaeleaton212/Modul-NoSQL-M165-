#cloud-config

# Benutzer-Konfiguration
users:
    - name: ubuntu
      sudo: ALL=(ALL) NOPASSWD:ALL  # Sudo ohne Passwort erlaubt
      groups: users, admin
      home: /home/ubuntu
      shell: /bin/bash
      ssh_authorized_keys:  # Erlaubte SSH Public Keys
          - ssh-rsa  teacher-key
          - ssh-rsa  teacher-key
          - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKCuWX/W66sjjNiDNuPpKgYO1xFqDoMJoeo5hz2LDNrF teacher-key-wir
          - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJZRzJzwcRdDvWQsfd+edVKd8jfEmaEmK/Me4iiwXqcV mein-aws-key

# SSH Login mit Passwort deaktiviert, Root-Login erlaubt
ssh_pwauth: false
disable_root: false

# Pakete aktualisieren und installieren
package_update: true
packages:
    - unzip
    - gnupg   # Wird fuer den MongoDB GPG-Key benoetigt
    - curl
    - ufw     # Firewall

# Dateien auf dem Server erstellen
write_files:
    - path: /home/ubuntu/mongodconfupdate.sh
      content: |
          # Aktiviert Authentifizierung in der MongoDB-Konfiguration
          sudo sed -i 's/#security:/security:\n  authorization: enabled/g' /etc/mongod.conf

    - path: /home/ubuntu/mongodbuser.txt
      content: |
          # Erstellt einen Admin-Benutzer mit vollen Rechten
          use admin;
          db.createUser(
            {
              user: "admin",
              pwd: "admin",
              roles: [
                { role: "userAdminAnyDatabase", db: "admin" },
                { role: "readWriteAnyDatabase", db: "admin" }
              ]
            }
          );

runcmd:
    # MongoDB 6.0 Repository einrichten
    - curl -fsSL https://pgp.mongodb.com/server-6.0.asc | sudo gpg -o /usr/share/keyrings/mongodb-server-6.0.gpg --dearmor
    - echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-6.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/6.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-6.0.list
    - sudo apt-get update -y
    - sudo apt-get install -y mongodb-org

    # MongoDB so konfigurieren, dass sie von ueberall erreichbar ist
    - sudo sed -i 's/127.0.0.1/0.0.0.0/g' /etc/mongod.conf

    # Authentifizierungs-Skript ausfuehren
    - sudo chmod +x /home/ubuntu/mongodconfupdate.sh
    - sudo /home/ubuntu/mongodconfupdate.sh

    # Firewall: SSH und MongoDB-Port freigeben
    - sudo ufw allow OpenSSH
    - sudo ufw allow 27017/tcp
    - sudo ufw --force enable

    # MongoDB starten und Admin-Benutzer anlegen
    - sudo systemctl enable mongod
    - sudo systemctl start mongod
    - sudo sleep 3  # Warten bis MongoDB bereit ist
    - sudo mongosh < /home/ubuntu/mongodbuser.txt

    # MongoDB mit neuer Konfiguration neu starten
    - sudo systemctl restart mongod